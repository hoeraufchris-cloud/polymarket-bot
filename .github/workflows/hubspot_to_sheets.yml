name: HubSpot to Sheets Daily Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

concurrency:
  group: hubspot-to-sheets-daily
  cancel-in-progress: true

jobs:
  run-sync:
    runs-on: ubuntu-latest

    env:
      HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_WORKSHEET_NAME: ${{ secrets.GOOGLE_WORKSHEET_NAME }}
      GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: DEBUG SHOW WORKSPACE
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la
          find "$GITHUB_WORKSPACE" -maxdepth 2 -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r "$GITHUB_WORKSPACE/requirements.txt"

      - name: Rebuild service account file
        run: |
          cat <<'EOF' > "$GITHUB_WORKSPACE/service_account.json"
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Run script
        run: python "$GITHUB_WORKSPACE/main.py"

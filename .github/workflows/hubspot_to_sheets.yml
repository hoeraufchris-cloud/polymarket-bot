name: HubSpot to Sheets Daily Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

concurrency:
  group: hubspot-to-sheets-daily
  cancel-in-progress: true

jobs:
  run-sync:
    runs-on: ubuntu-latest

    env:
      HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_WORKSHEET_NAME: ${{ secrets.GOOGLE_WORKSHEET_NAME }}
      GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: DEBUG SHOW WORKSPACE
        run: |
          echo "PWD:"
          pwd
          echo "FILES:"
          ls -la
          echo "TOP FILES:"
          find . -maxdepth 2 -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild service account file
        run: |
          cat <<'EOF' > service_account.json
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: DEBUG WHICH MAIN
        run: |
          pwd
          ls -la
          python --version
          test -f ./main.py && echo "main.py exists" || echo "main.py missing"

      - name: Run script
        run: python ./main.py
